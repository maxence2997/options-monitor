name: 盤中即時監控

on:
  schedule:
    # 開盤後 1 小時
    # 夏令：10:30 AM EDT = 14:30 UTC
    # 冬令：10:30 AM EST = 15:30 UTC
    # ⚠️ 冬令切換時請改為 "30 15 * * 1-5"（約 11/1 後）
    - cron: "30 14 * * 1-5"

    # 收盤前 1 小時
    # 夏令：3:00 PM EDT = 19:00 UTC
    # 冬令：3:00 PM EST = 20:00 UTC
    # ⚠️ 冬令切換時請改為 "0 20 * * 1-5"（約 11/1 後）
    - cron: "0 19 * * 1-5"
  workflow_dispatch:

jobs:
  intraday-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: 執行盤中監控
        env:
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_NOTIFY_CHAT_ID: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          GIST_ID:                 ${{ secrets.GIST_ID }}
          GIST_TOKEN:              ${{ secrets.GIST_TOKEN }}
        run: python src/monitor.py --mode intraday
